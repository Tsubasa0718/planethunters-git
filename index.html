  <main>
    <section class="p-story" id="story">
      <div class="l-container">
        <div class="p-story__inner">
          <div class="p-story__columunwrap">
            <figure class="p-story__columun">
              <div class="p-story__desc">
                <h2 class="c-section-head c-engfont">STORY</h2>
                <p class="p-story__title">
                  奪われた故郷の星を取り戻せ <br>
                  壮大なSFファンタジー
                </p>
                <figcaption class="p-story__text">
                  <p>
                    銀河歴222年、惑星ネコチャンは、ボスネコ将軍の率いる軍の反乱により完全に
                    制圧された。将軍の側近マンチカンは軍政府に従わない人間を辺境の星ニャゴ
                    ーへ強制的に追放。食料や資源の乏しいニャゴーでは多くの難民が発生し飢餓
                    に苦しんでいた。ニャゴーのスラム街で育った孤児の姉弟がいた。姉のミケと
                    弟のタマは母親をボスネコ将軍に殺された事実を知る。母の復讐のため、そし
                    て故郷の惑星ネコチャンを奪還すべく、ミケとタマはいま行動に出る！
                  </p>
                </figcaption>
              </div>
                <div class="p-story__image">
                  <img src="./assets/img/story-01.jpg" alt="謎の人物">
                </div>
            </figure>
            
           <figure class="p-story__columun reserve">
              <div class="p-story__desc">
                <p class="p-story__title">
                  隠された陰謀を暴け<br>
                  衝撃的な事実に驚愕
                </p>
                <figcaption class="p-story__text">
                  <p>
                    ミケとタマはネコジャラシ作戦により軍政府の最新鋭の小型船チュールを奪うことに成功。
                    チュールのハイテンションワープ星間航行により惑星ネコチャンへあとわずか３時間で到
                    着という時、小惑星帯アビシニアンで謎の救難信号を受信する。意外にも信号の発信源は
                    ボスネコ将軍だった。彼は今にも絶えそうなかすれた声で「私はおまえたちミケとタマの
                    父親なのだ」と語る。その瞬間、ミケとタマの育ての親同然で仲間のはずのホワイトオッド
                    アイがタマの背中を刀で切り裂いたのだった......
                  </p>
                </figcaption>
              </div>
                <div class="p-story__image">
                  <img src="./assets/img/story-02.jpg" alt="姉のミケと弟のタマ">
                </div>
            </figure>
